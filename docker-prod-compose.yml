# WhatIRead production stack — pull images from Docker Hub, configure via .env
# Usage: cp .env.example .env && docker compose -f docker-prod-compose.yml up -d
# Optional observability: set COMPOSE_PROFILES=observability in .env

# ---------------------------------------------------------------------------
# Core application
# ---------------------------------------------------------------------------
services:
  db:
    container_name: whatiread-prod-db
    image: postgres:16.8-alpine
    user: postgres
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: whatiread
      POSTGRES_USER: whatiread
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - whatiread-prod-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatiread -d whatiread"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  api:
    container_name: whatiread-prod-api
    image: vinayk101/whatiread-api:${IMAGE_TAG:-latest}
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/whatiread
      DATABASE_USERNAME: whatiread
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://books.example.com}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      WHATIREAD_LOKI_URL: ${WHATIREAD_LOKI_URL:-http://loki:3100/loki/api/v1/push}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    mem_limit: 768m
    cpus: 2.0
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  web:
    container_name: whatiread-prod-web
    image: vinayk101/whatiread-web:${IMAGE_TAG:-latest}
    user: nginx
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp/nginx:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    ports:
      - "${HTTP_PORT:-80}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  # ---------------------------------------------------------------------------
  # Observability stack (profile: observability)
  # ---------------------------------------------------------------------------
  otel-collector:
    container_name: whatiread-prod-otel-collector
    profiles:
      - observability
    image: otel/opentelemetry-collector-contrib:0.100.0
    security_opt:
      - no-new-privileges:true
    command: ["--config=/etc/otel-collector-config.yml"]
    environment:
      OTEL_TAIL_SAMPLING_DECISION_WAIT: ${OTEL_TAIL_SAMPLING_DECISION_WAIT:-10s}
      OTEL_TAIL_SAMPLING_SLOW_MS: ${OTEL_TAIL_SAMPLING_SLOW_MS:-2000}
      OTEL_TAIL_SAMPLING_CRITICAL_PERCENT: ${OTEL_TAIL_SAMPLING_CRITICAL_PERCENT:-50}
      OTEL_TAIL_SAMPLING_NORMAL_PERCENT: ${OTEL_TAIL_SAMPLING_NORMAL_PERCENT:-5}
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      - jaeger
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  prometheus:
    container_name: whatiread-prod-prometheus
    profiles:
      - observability
    image: prom/prometheus:v2.51.2
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - whatiread-prod-prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  jaeger:
    container_name: whatiread-prod-jaeger
    profiles:
      - observability
    image: jaegertracing/all-in-one:1.56
    security_opt:
      - no-new-privileges:true
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  loki:
    container_name: whatiread-prod-loki
    profiles:
      - observability
    image: grafana/loki:2.9.5
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - whatiread-prod-network

  grafana:
    container_name: whatiread-prod-grafana
    profiles:
      - observability
    image: grafana/grafana:10.4.2
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - whatiread-prod-grafana-data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_DISABLE_LOGIN:-false}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - jaeger
      - loki
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - whatiread-prod-network

networks:
  whatiread-prod-network:
    name: whatiread-prod-network

volumes:
  whatiread-prod-postgres-data:
    name: whatiread-prod-postgres-data
  whatiread-prod-prometheus-data:
    name: whatiread-prod-prometheus-data
  whatiread-prod-grafana-data:
    name: whatiread-prod-grafana-data
