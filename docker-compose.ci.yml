# CI overrides — more startup headroom for cold Spring Boot + Liquibase on GitHub runners.
services:
  api:
    mem_limit: 1536m
    cpus: 2.0
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=50.0 -XX:+ExitOnOutOfMemoryError
    healthcheck:
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 240s

  web:
    depends_on:
      api:
        condition: service_healthy
