# WhatIRead stack. Configure via .env (example placeholders), then: docker compose up --build -d

services:
  db:
    image: postgres:16.8-alpine
    user: postgres
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: whatiread
      POSTGRES_USER: whatiread
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatiread -d whatiread"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    security_opt:
      - no-new-privileges:true
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-dev-master-key}
    volumes:
      - meilisearch_data:/meilisearch-data
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 1024m
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-whatiread-api:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: Dockerfile
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "8080"
    volumes:
      - avatars-data:/data/avatars
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://db:5432/whatiread
      DATABASE_USERNAME: whatiread
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      MEILISEARCH_HOST: ${MEILISEARCH_HOST:-http://meilisearch:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-${MEILISEARCH_MASTER_KEY:-dev-master-key}}
      MEILISEARCH_ENABLED: ${MEILISEARCH_ENABLED:-true}
      MEILISEARCH_LOAD_SEED_ON_STARTUP: ${MEILISEARCH_LOAD_SEED_ON_STARTUP:-true}
      MEILISEARCH_LOAD_USERS_ON_STARTUP: ${MEILISEARCH_LOAD_USERS_ON_STARTUP:-true}
      WHATIREAD_AVATARS_DIRECTORY: /data/avatars
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    mem_limit: 768m
    cpus: 2.0
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-whatiread-web:${IMAGE_TAG:-latest}}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    user: nginx
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp/nginx:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    ports:
      - "${HTTP_PORT:-80}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  # Optional — set COMPOSE_PROFILES in .env (obs-prometheus, obs-jaeger, obs-otel, obs-loki, obs-grafana)
  otel-collector:
    profiles: [obs-otel, observability]
    image: otel/opentelemetry-collector-contrib:0.100.0
    security_opt:
      - no-new-privileges:true
    command: ["--config=/etc/otel-collector-config.yml"]
    environment:
      OTEL_TAIL_SAMPLING_DECISION_WAIT: ${OTEL_TAIL_SAMPLING_DECISION_WAIT:-10s}
      OTEL_TAIL_SAMPLING_SLOW_MS: ${OTEL_TAIL_SAMPLING_SLOW_MS:-2000}
      OTEL_TAIL_SAMPLING_CRITICAL_PERCENT: ${OTEL_TAIL_SAMPLING_CRITICAL_PERCENT:-50}
      OTEL_TAIL_SAMPLING_NORMAL_PERCENT: ${OTEL_TAIL_SAMPLING_NORMAL_PERCENT:-5}
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      jaeger:
        condition: service_started
        required: false
    mem_limit: 256m
    restart: unless-stopped

  prometheus:
    profiles: [obs-prometheus, observability]
    image: prom/prometheus:v2.51.2
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    mem_limit: 512m
    restart: unless-stopped

  jaeger:
    profiles: [obs-jaeger, observability]
    image: jaegertracing/all-in-one:1.56
    security_opt:
      - no-new-privileges:true
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
    mem_limit: 256m
    restart: unless-stopped

  loki:
    profiles: [obs-loki, observability]
    image: grafana/loki:2.9.5
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 512m
    restart: unless-stopped

  grafana:
    profiles: [obs-grafana, observability]
    image: grafana/grafana:10.4.2
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_DISABLE_LOGIN:-false}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
        required: false
      jaeger:
        condition: service_started
        required: false
      loki:
        condition: service_started
        required: false
    mem_limit: 256m
    restart: unless-stopped

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:8087:8080"
    mem_limit: 128m
    restart: unless-stopped

volumes:
  pgdata:
  meilisearch_data:
  avatars-data:
    name: avatars-data
  prometheus_data:
  grafana_data:
