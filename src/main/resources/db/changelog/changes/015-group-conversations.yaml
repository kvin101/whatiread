databaseChangeLog:
  - changeSet:
      id: 015-group-conversations
      author: whatiread
      changes:
        - addColumn:
            tableName: conversations
            columns:
              - column:
                  name: type
                  type: varchar(20)
                  defaultValue: DIRECT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: created_by_id
                  type: uuid
        - dropNotNullConstraint:
            tableName: conversations
            columnName: user_a_id
            columnDataType: uuid
        - dropNotNullConstraint:
            tableName: conversations
            columnName: user_b_id
            columnDataType: uuid
        - addForeignKeyConstraint:
            baseTableName: conversations
            baseColumnNames: created_by_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_conversations_created_by
            onDelete: SET NULL
        - createTable:
            tableName: conversation_participants
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: conversation_participants
            columnNames: conversation_id, user_id
            constraintName: uk_conversation_participants_conv_user
        - addForeignKeyConstraint:
            baseTableName: conversation_participants
            baseColumnNames: conversation_id
            referencedTableName: conversations
            referencedColumnNames: id
            constraintName: fk_conversation_participants_conversation
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: conversation_participants
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_conversation_participants_user
            onDelete: CASCADE
        - createIndex:
            indexName: idx_conversation_participants_user
            tableName: conversation_participants
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_conversation_participants_conversation
            tableName: conversation_participants
            columns:
              - column:
                  name: conversation_id
