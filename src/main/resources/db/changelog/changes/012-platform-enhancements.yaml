databaseChangeLog:
  - changeSet:
      id: 012-outbox-events
      author: whatiread
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: clob
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: timestamp with time zone
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_outbox_events_pending
            tableName: outbox_events
            columns:
              - column:
                  name: processed_at
              - column:
                  name: created_at

  - changeSet:
      id: 012-idempotency-keys
      author: whatiread
      changes:
        - createTable:
            tableName: idempotency_keys
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: idempotency_key
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: http_method
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: request_path
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: response_status
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: response_body
                  type: clob
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

  - changeSet:
      id: 012-shedlock
      author: whatiread
      changes:
        - createTable:
            tableName: shedlock
            columns:
              - column:
                  name: name
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: lock_until
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: locked_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: locked_by
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 012-import-jobs
      author: whatiread
      changes:
        - createTable:
            tableName: import_jobs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: result_json
                  type: clob
              - column:
                  name: error_message
                  type: varchar(2000)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: timestamp with time zone
        - addForeignKeyConstraint:
            baseTableName: import_jobs
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_import_jobs_user
            onDelete: CASCADE

  - changeSet:
      id: 012-explore-read-model
      author: whatiread
      changes:
        - createTable:
            tableName: explore_shelf_read_model
            columns:
              - column:
                  name: shelf_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: visibility
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: icon
                  type: varchar(32)
              - column:
                  name: book_count
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: cursor_token
                  type: varchar(100)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_explore_read_model_cursor
            tableName: explore_shelf_read_model
            columns:
              - column:
                  name: cursor_token
              - column:
                  name: updated_at

  - changeSet:
      id: 012-soft-delete-and-version
      author: whatiread
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addColumn:
            tableName: shelves
            columns:
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addColumn:
            tableName: books
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addColumn:
            tableName: user_books
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
