databaseChangeLog:
  - changeSet:
      id: 015-recommendation-enhancements
      author: whatiread
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: accept_recommendations
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - addColumn:
            tableName: recommendations
            columns:
              - column:
                  name: target_type
                  type: varchar(20)
                  defaultValue: BOOK
                  constraints:
                    nullable: false
              - column:
                  name: shelf_id
                  type: uuid
        - dropNotNullConstraint:
            tableName: recommendations
            columnName: book_id
            columnDataType: uuid
        - addForeignKeyConstraint:
            baseTableName: recommendations
            baseColumnNames: shelf_id
            referencedTableName: shelves
            referencedColumnNames: id
            constraintName: fk_recommendations_shelf
            onDelete: CASCADE
