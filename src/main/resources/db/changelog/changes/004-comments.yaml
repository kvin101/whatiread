databaseChangeLog:
  - changeSet:
      id: 004-comments
      author: whatiread
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: author_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: target_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: target_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: varchar(2000)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: comments
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_comments_author
            onDelete: CASCADE
        - createIndex:
            indexName: idx_comments_target
            tableName: comments
            columns:
              - column:
                  name: target_type
              - column:
                  name: target_id
              - column:
                  name: created_at
