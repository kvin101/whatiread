databaseChangeLog:
  - changeSet:
      id: 015-shelf-share-links
      author: whatiread
      changes:
        - createTable:
            tableName: shelf_share_links
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: shelf_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
              - column:
                  name: revoked_at
                  type: timestamp with time zone
        - addForeignKeyConstraint:
            baseTableName: shelf_share_links
            baseColumnNames: shelf_id
            referencedTableName: shelves
            referencedColumnNames: id
            constraintName: fk_shelf_share_links_shelf
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: shelf_share_links
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_shelf_share_links_created_by
            onDelete: CASCADE
        - createIndex:
            tableName: shelf_share_links
            indexName: idx_shelf_share_links_shelf
            columns:
              - column:
                  name: shelf_id
