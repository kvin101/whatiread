databaseChangeLog:
  - changeSet:
      id: 008-shelf-events
      author: whatiread
      changes:
        - createTable:
            tableName: shelf_events
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: shelf_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: actor_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: clob
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: shelf_events
            baseColumnNames: shelf_id
            referencedTableName: shelves
            referencedColumnNames: id
            constraintName: fk_shelf_events_shelf
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: shelf_events
            baseColumnNames: actor_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_shelf_events_actor
            onDelete: CASCADE
        - createIndex:
            tableName: shelf_events
            indexName: idx_shelf_events_shelf_created
            columns:
              - column:
                  name: shelf_id
              - column:
                  name: created_at
