databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: whatiread
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: isbn13
                  type: varchar(13)
                  constraints:
                    unique: true
              - column:
                  name: title
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: subtitle
                  type: varchar(500)
              - column:
                  name: authors
                  type: clob
                  constraints:
                    nullable: false
              - column:
                  name: page_count
                  type: int
              - column:
                  name: cover_url
                  type: varchar(2048)
              - column:
                  name: description
                  type: clob
              - column:
                  name: source
                  type: varchar(50)
              - column:
                  name: external_id
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

        - createTable:
            tableName: user_books
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: book_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: rating
                  type: decimal(2, 1)
              - column:
                  name: progress_pages
                  type: int
              - column:
                  name: progress_percent
                  type: smallint
              - column:
                  name: started_at
                  type: date
              - column:
                  name: finished_at
                  type: date
              - column:
                  name: note
                  type: clob
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: user_books
            columnNames: user_id, book_id
            constraintName: uk_user_books_user_book

        - addForeignKeyConstraint:
            baseTableName: user_books
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_books_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_books
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_user_books_book
            onDelete: RESTRICT

        - createTable:
            tableName: shelves
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: shelves
            columnNames: user_id, slug
            constraintName: uk_shelves_user_slug

        - addForeignKeyConstraint:
            baseTableName: shelves
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_shelves_user
            onDelete: CASCADE

        - createTable:
            tableName: shelf_books
            columns:
              - column:
                  name: shelf_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_book_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: shelf_books
            columnNames: shelf_id, user_book_id
            constraintName: pk_shelf_books

        - addForeignKeyConstraint:
            baseTableName: shelf_books
            baseColumnNames: shelf_id
            referencedTableName: shelves
            referencedColumnNames: id
            constraintName: fk_shelf_books_shelf
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: shelf_books
            baseColumnNames: user_book_id
            referencedTableName: user_books
            referencedColumnNames: id
            constraintName: fk_shelf_books_user_book
            onDelete: CASCADE

        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: tags
            columnNames: user_id, name
            constraintName: uk_tags_user_name

        - addForeignKeyConstraint:
            baseTableName: tags
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tags_user
            onDelete: CASCADE

        - createTable:
            tableName: user_book_tags
            columns:
              - column:
                  name: user_book_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: uuid
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: user_book_tags
            columnNames: user_book_id, tag_id
            constraintName: pk_user_book_tags

        - addForeignKeyConstraint:
            baseTableName: user_book_tags
            baseColumnNames: user_book_id
            referencedTableName: user_books
            referencedColumnNames: id
            constraintName: fk_user_book_tags_user_book
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_book_tags
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_user_book_tags_tag
            onDelete: CASCADE

        - createTable:
            tableName: reading_goals
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: year
                  type: smallint
                  constraints:
                    nullable: false
              - column:
                  name: target_books
                  type: int
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: reading_goals
            columnNames: user_id, year
            constraintName: uk_reading_goals_user_year

        - addForeignKeyConstraint:
            baseTableName: reading_goals
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reading_goals_user
            onDelete: CASCADE

        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user
            onDelete: CASCADE

        - createIndex:
            indexName: idx_user_books_user_status
            tableName: user_books
            columns:
              - column:
                  name: user_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_books_isbn13
            tableName: books
            columns:
              - column:
                  name: isbn13
