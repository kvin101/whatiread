  - changeSet:
      id: 003-postgres-reading-percent-fn
      author: whatiread
      dbms: postgresql
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION calc_reading_percent(p_pages integer, p_total integer)
              RETURNS smallint
              LANGUAGE plpgsql
              IMMUTABLE
              AS $$
              BEGIN
                IF p_total IS NULL OR p_total <= 0 OR p_pages IS NULL THEN
                  RETURN NULL;
                END IF;
                RETURN LEAST(100, GREATEST(0, ROUND(p_pages * 100.0 / p_total)))::smallint;
              END;
              $$;
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION user_books_sync_progress_percent()
              RETURNS trigger
              LANGUAGE plpgsql
              AS $$
              DECLARE
                total integer;
              BEGIN
                IF NEW.status = 'READ' THEN
                  NEW.progress_percent := 100;
                  RETURN NEW;
                END IF;
                SELECT page_count INTO total FROM books WHERE id = NEW.book_id;
                NEW.progress_percent := calc_reading_percent(NEW.progress_pages, total);
                RETURN NEW;
              END;
              $$;
        - sql:
            splitStatements: false
            sql: |
              DROP TRIGGER IF EXISTS trg_user_books_progress_percent ON user_books;
              CREATE TRIGGER trg_user_books_progress_percent
              BEFORE INSERT OR UPDATE OF progress_pages, book_id, status ON user_books
              FOR EACH ROW
              EXECUTE FUNCTION user_books_sync_progress_percent();
