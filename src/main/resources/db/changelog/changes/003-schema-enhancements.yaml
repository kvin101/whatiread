databaseChangeLog:
  - changeSet:
      id: 003-users-profile
      author: whatiread
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: first_name
                  type: varchar(100)
              - column:
                  name: last_name
                  type: varchar(100)
              - column:
                  name: phone_number
                  type: varchar(20)
              - column:
                  name: avatar_url
                  type: varchar(2048)
              - column:
                  name: address_line1
                  type: varchar(255)
              - column:
                  name: address_line2
                  type: varchar(255)
              - column:
                  name: city
                  type: varchar(100)
              - column:
                  name: state
                  type: varchar(100)
              - column:
                  name: postal_code
                  type: varchar(20)
              - column:
                  name: country
                  type: varchar(100)
              - column:
                  name: is_writer
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: writer_bio
                  type: clob
        - sql:
            sql: UPDATE users SET first_name = display_name WHERE first_name IS NULL AND display_name IS NOT NULL
        - dropColumn:
            tableName: users
            columnName: display_name

  - changeSet:
      id: 003-books-audit-and-isbn
      author: whatiread
      changes:
        - renameColumn:
            tableName: books
            oldColumnName: isbn13
            newColumnName: isbn
            columnDataType: varchar(13)
        - modifyDataType:
            tableName: books
            columnName: isbn
            newDataType: varchar(20)
        - addColumn:
            tableName: books
            columns:
              - column:
                  name: updated_at
                  type: timestamp with time zone
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: updated_by
                  type: uuid
              - column:
                  name: average_rating
                  type: decimal(3, 2)
              - column:
                  name: rating_count
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - sql:
            sql: UPDATE books SET updated_at = created_at WHERE updated_at IS NULL
        - addNotNullConstraint:
            tableName: books
            columnName: updated_at
            columnDataType: timestamp with time zone
        - createIndex:
            indexName: idx_books_isbn
            tableName: books
            columns:
              - column:
                  name: isbn
        - dropIndex:
            indexName: idx_books_isbn13
            tableName: books
        - addForeignKeyConstraint:
            baseTableName: books
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_books_created_by
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: books
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_books_updated_by
            onDelete: SET NULL

