name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"
  DOCKERHUB_REPO_API: vinayk101/whatiread-api
  DOCKERHUB_REPO_WEB: vinayk101/whatiread-web
  GHCR_REPO_API: ghcr.io/kvin101/whatiread-api
  GHCR_REPO_WEB: ghcr.io/kvin101/whatiread-web
  APP_VERSION: 0.0.1
  PUSH_IMAGES: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
  CI_BASE_URL: http://localhost:8080
  CI_IMAGE_TAG: ci

jobs:
  backend:
    name: Backend (unit, integration, coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify (tests + JaCoCo)
        run: ./mvnw -B verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  integration:
    name: Build, scan, E2E, and publish
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    environment: whairead
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: env.PUSH_IMAGES == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: whatiread-api:${{ env.CI_IMAGE_TAG }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          build-args: VITE_API_URL=
          platforms: linux/amd64
          push: false
          load: true
          tags: whatiread-web:${{ env.CI_IMAGE_TAG }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Scan API image for CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: whatiread-api:${{ env.CI_IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Scan web image for CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: whatiread-web:${{ env.CI_IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Create Compose env
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=ci-postgres-password-32chars-min
          JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
          MEILISEARCH_MASTER_KEY=ci-meilisearch-master-key-minimum
          MEILISEARCH_API_KEY=ci-meilisearch-master-key-minimum
          REGISTRATION_ENABLED=true
          RATE_LIMIT_ENABLED=false
          CORS_ORIGINS=http://localhost:8080
          HTTP_PORT=8080
          IMAGE_TAG=ci
          MEILI_ENV=development
          MEILISEARCH_ENABLED=true
          MEILISEARCH_LOAD_SEED_ON_STARTUP=false
          MEILISEARCH_LOAD_USERS_ON_STARTUP=false
          OBSERVABILITY_ENABLED=false
          OTEL_SDK_DISABLED=true
          COMPOSE_PROFILES=
          EOF

      - name: Start stack and wait for health
        run: docker compose up -d --wait db meilisearch api web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests (headless)
        working-directory: frontend
        env:
          CI: "true"
          BASE_URL: ${{ env.CI_BASE_URL }}
        run: npm run test:e2e

      - name: Push API image
        if: env.PUSH_IMAGES == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.DOCKERHUB_REPO_API }}:latest
            ${{ env.DOCKERHUB_REPO_API }}:${{ github.sha }}
            ${{ env.GHCR_REPO_API }}:latest
            ${{ env.GHCR_REPO_API }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=api

      - name: Push web image
        if: env.PUSH_IMAGES == 'true'
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          build-args: VITE_API_URL=
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.DOCKERHUB_REPO_WEB }}:latest
            ${{ env.DOCKERHUB_REPO_WEB }}:${{ github.sha }}
            ${{ env.GHCR_REPO_WEB }}:latest
            ${{ env.GHCR_REPO_WEB }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=web

      - name: Upload API Trivy SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        with:
          image-ref: whatiread-api:${{ env.CI_IMAGE_TAG }}
          format: sarif
          output: trivy-api.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload web Trivy SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        with:
          image-ref: whatiread-web:${{ env.CI_IMAGE_TAG }}
          format: sarif
          output: trivy-web.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM

      - name: Store Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: |
            trivy-api.sarif
            trivy-web.sarif
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs db --tail 50
          docker compose logs meilisearch --tail 50
          docker compose logs api --tail 120
          docker compose logs web --tail 50

      - name: Stop stack
        if: always()
        run: docker compose down -v

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Trivy SARIF reports
        uses: actions/download-artifact@v4
        with:
          name: trivy-sarif

      - name: Prepare release notes
        run: |
          cat > release-body.md <<EOF
          ## Container images

          | Component | Docker Hub | GitHub Packages |
          |-----------|------------|-----------------|
          | API | \`vinayk101/whatiread-api:${{ github.sha }}\` | \`ghcr.io/kvin101/whatiread-api:${{ github.sha }}\` |
          | Web | \`vinayk101/whatiread-web:${{ github.sha }}\` | \`ghcr.io/kvin101/whatiread-web:${{ github.sha }}\` |

          \`latest\` tags were updated on this push.
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: WhatIRead v${{ env.APP_VERSION }} (build ${{ github.run_number }})
          body_path: release-body.md
          files: |
            trivy-api.sarif
            trivy-web.sarif

