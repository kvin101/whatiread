name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"
  DOCKERHUB_REPO_API: vinayk101/whatiread-api
  DOCKERHUB_REPO_WEB: vinayk101/whatiread-web
  PUSH_IMAGES: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
  CI_BASE_URL: http://localhost:8080

jobs:
  backend:
    name: Backend (unit, integration, coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify (tests + JaCoCo)
        run: ./mvnw -B verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright, headless)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Create Compose env
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=ci-postgres-password-32chars-min
          JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
          MEILISEARCH_MASTER_KEY=ci-meilisearch-master-key-minimum
          MEILISEARCH_API_KEY=ci-meilisearch-master-key-minimum
          REGISTRATION_ENABLED=true
          RATE_LIMIT_ENABLED=false
          CORS_ORIGINS=http://localhost:8080
          HTTP_PORT=8080
          MEILI_ENV=development
          MEILISEARCH_ENABLED=true
          MEILISEARCH_LOAD_SEED_ON_STARTUP=false
          MEILISEARCH_LOAD_USERS_ON_STARTUP=false
          OBSERVABILITY_ENABLED=false
          OTEL_SDK_DISABLED=true
          COMPOSE_PROFILES=
          EOF

      - name: Start stack
        run: docker compose up --build -d db meilisearch api web

      - name: Wait for stack
        run: chmod +x scripts/ci/wait-for-stack.sh && BASE_URL="${{ env.CI_BASE_URL }}" ./scripts/ci/wait-for-stack.sh 180

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run all E2E tests (headless)
        working-directory: frontend
        env:
          CI: "true"
          BASE_URL: ${{ env.CI_BASE_URL }}
        run: npm run test:e2e

      - name: Dump CI logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs db --tail 50
          docker compose logs meilisearch --tail 50
          docker compose logs api --tail 120
          docker compose logs web --tail 50

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: docker compose down -v

  docker:
    name: Docker build, push, and CVE scan
    runs-on: ubuntu-latest
    environment: whairead
    needs: [backend, frontend, e2e]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO_API }}
          tags: |
            type=raw,value=ci
            type=raw,value=latest,enable=${{ env.PUSH_IMAGES == 'true' }}
            type=sha,format=long,prefix=,enable=${{ env.PUSH_IMAGES == 'true' }}

      - name: Build API image
        uses: docker/build-push-action@v6
        id: build-api
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.PUSH_IMAGES == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          load: ${{ env.PUSH_IMAGES != 'true' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Scan API image for CVEs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.PUSH_IMAGES == 'true' && format('{0}:{1}', env.DOCKERHUB_REPO_API, github.sha) || format('{0}:ci', env.DOCKERHUB_REPO_API) }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO_WEB }}
          tags: |
            type=raw,value=ci
            type=raw,value=latest,enable=${{ env.PUSH_IMAGES == 'true' }}
            type=sha,format=long,prefix=,enable=${{ env.PUSH_IMAGES == 'true' }}

      - name: Build web image
        uses: docker/build-push-action@v6
        id: build-web
        with:
          context: frontend
          file: frontend/Dockerfile
          build-args: VITE_API_URL=
          platforms: ${{ env.PUSH_IMAGES == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          load: ${{ env.PUSH_IMAGES != 'true' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Scan web image for CVEs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.PUSH_IMAGES == 'true' && format('{0}:{1}', env.DOCKERHUB_REPO_WEB, github.sha) || format('{0}:ci', env.DOCKERHUB_REPO_WEB) }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Upload API Trivy SARIF
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: ${{ env.PUSH_IMAGES == 'true' && format('{0}:{1}', env.DOCKERHUB_REPO_API, github.sha) || format('{0}:ci', env.DOCKERHUB_REPO_API) }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload web Trivy SARIF
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: ${{ env.PUSH_IMAGES == 'true' && format('{0}:{1}', env.DOCKERHUB_REPO_WEB, github.sha) || format('{0}:ci', env.DOCKERHUB_REPO_WEB) }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Store Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: |
            trivy-api.sarif
            trivy-web.sarif
          retention-days: 14
          if-no-files-found: ignore
